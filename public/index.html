<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ellexis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FAVICON + ICONS -->
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />

  <!-- PWA MANIFEST -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b6efd" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <!-- GLOBAL BACKGROUND -->
  <div class="page-bg" id="global-bg"></div>

  <!-- HEADER -->
  <header class="app-header">
    <div class="brand">
      <span class="logo-dot"></span>
      <h1>Ellexis</h1>
    </div>

    <nav id="top-nav"></nav>

    <!-- LIVE PORTAL CONNECTION STATUS -->
    <div class="portal-status" id="portal-status">Portal: Not connected</div>
  </header>

  <!-- MAIN APP VIEW -->
  <main id="view-root"></main>

  <!-- FOOTER -->
  <footer class="app-footer">
    <small>Ellexis · Your complete college brain</small>
  </footer>

  <!-- CORE APP -->
  <script type="module" src="js/app.js"></script>

  <!-- SCRAPER BRIDGE (EXTENSION + IN-APP) -->
  <script type="module" src="js/scraper.js"></script>
</body>
</html>
